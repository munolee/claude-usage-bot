name: Release

# Triggered by pushing a tag like `v0.1.0`. Builds the .app on a macOS runner,
# wraps it in a UDZO-compressed .dmg, and uploads to a GitHub Release with the
# same tag. The dmg is what users download via the README link or curl through
# scripts/install-from-release.sh.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach the build to (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write  # needed by softprops/action-gh-release to create/update releases

jobs:
  build-and-release:
    # macos-15 ships Xcode 16 / Swift 6 by default, which matches our Package.swift.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build & package .app
        run: ./scripts/package-app.sh

      - name: Build the .dmg (read-only, UDZO-compressed)
        run: |
          hdiutil create \
            -volname "ClaudeUsageBot" \
            -srcfolder .build/release/ClaudeUsageBot.app \
            -ov -format UDZO \
            .build/release/ClaudeUsageBot.dmg

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: .build/release/ClaudeUsageBot.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
